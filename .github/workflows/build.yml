name: Build debug APK

# What this workflow does:
#
#  1. Every push and pull request -> build a debug APK and upload it as a
#     workflow Artifact (the temporary kind that lives on the Actions tab).
#  2. Pushes to main -> ALSO publish a GitHub Release with the APK attached.
#     - A versioned release tagged `build-<run_number>-<sha>` accumulates
#       in the Releases page, so you can always grab any historical build.
#     - A floating release tagged `latest` is overwritten each time, giving
#       you a permanent download URL that always points at the newest build:
#         https://github.com/CodingGenius0001/pulse/releases/latest/download/pulse-debug.apk
#
# Concurrency: pushes that come in while a build is running cancel the
# previous run on the same ref. Saves CI minutes and avoids racing two
# release publishes at the same SHA.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed for the release-creation steps below

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the persistent debug keystore from a base64 secret so every CI
      # build is signed with the same key. This lets users update from one
      # build to the next without uninstalling first (Android refuses installs
      # that change signing keys, even for "debug" builds).
      #
      # Required secrets — see README for setup:
      #   DEBUG_KEYSTORE_BASE64    base64 of debug.jks
      #   DEBUG_KEYSTORE_PASSWORD  store password
      #   DEBUG_KEY_ALIAS          alias name (default 'pulseDebugKey')
      #   DEBUG_KEY_PASSWORD       key password
      #
      # If DEBUG_KEYSTORE_BASE64 isn't set yet, this step writes nothing and
      # Gradle falls back to its auto-generated debug keystore (= old behaviour,
      # users still need to uninstall before installing new builds).
      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            mkdir -p app/keystore
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > app/keystore/debug.jks
            echo "✓ Debug keystore restored from secret"
          else
            echo "⚠ DEBUG_KEYSTORE_BASE64 not set — using Gradle's per-run debug keystore"
            echo "  In-app updates will require manual uninstall until this is configured."
          fi

      - name: Build debug APK
        env:
          # Read from repo secrets. Set in: GitHub repo → Settings →
          # Secrets and variables → Actions → New repository secret.
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
          # GITHUB_RUN_NUMBER is set by the runner automatically, but we
          # surface it explicitly so it's visible in the build log and so
          # any future restructuring doesn't accidentally drop it. The
          # Gradle script reads this and bakes it into BuildConfig.BUILD_NUMBER
          # — the in-app updater compares against that to detect new builds.
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # Rename so the file in the Release artifacts list is more recognizable
      # than 'app-debug.apk'. Doesn't change the artifact upload below.
      - name: Stage APK with friendly name
        run: |
          mkdir -p release-staging
          cp app/build/outputs/apk/debug/app-debug.apk release-staging/pulse-debug.apk

      - name: Upload workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: pulse-debug-apk
          path: release-staging/pulse-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ──────────────────────────────────────────────────────────────────
      # Below: only on pushes to main. Pull requests and feature branches
      # don't publish releases — they just upload the artifact.
      # ──────────────────────────────────────────────────────────────────

      - name: Compute release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "versioned_tag=build-${{ github.run_number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Publish versioned release (immutable history)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.versioned_tag }}
          name: "Build #${{ github.run_number }} (${{ steps.tag.outputs.short_sha }})"
          body: |
            Automated debug build from commit ${{ github.sha }}.

            **Install:**
            1. Download `pulse-debug.apk` below.
            2. Tap the APK on your phone. Android may warn about unknown sources; allow it for whichever app opened the file.
            3. If your currently installed build came from an older one-off debug key, uninstall once, install this build, and future CI builds can update normally.

            **Commit message:** ${{ github.event.head_commit.message }}
          files: release-staging/pulse-debug.apk
          prerelease: true   # marked pre-release since it's a debug build, not signed for production

      - name: Delete previous 'latest' tag/release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # action-gh-release can update an existing release's assets and notes
        # but won't move the underlying git tag to the new commit. So we
        # delete both the release and the tag first, then recreate. The `|| true`
        # guard makes the very first run (when nothing exists yet) a no-op.
        run: |
          gh release delete latest --yes --cleanup-tag || true

      - name: Update 'latest' floating release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest debug build"
          body: |
            **Build #${{ github.run_number }}** — auto-published from main.

            Permanent download link (always newest):
            https://github.com/CodingGenius0001/pulse/releases/latest/download/pulse-debug.apk

            Last updated from commit `${{ github.sha }}` (build #${{ github.run_number }}).
          files: release-staging/pulse-debug.apk
          make_latest: "true"
