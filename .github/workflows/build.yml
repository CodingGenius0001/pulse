name: Build debug APK

# Builds a debug APK on every push and pull request.
# Download the APK from the "Artifacts" section of each workflow run.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          # Read from a repo secret. Set it in: GitHub repo → Settings →
          # Secrets and variables → Actions → New repository secret.
          # Name: GENIUS_ACCESS_TOKEN, value: your token from genius.com/api-clients.
          # If the secret isn't set, the build still succeeds — the app just
          # won't have online metadata fetching enabled (everything else works).
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
